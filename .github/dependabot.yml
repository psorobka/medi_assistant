version: 2
updates:
  # GitHub Actions używane w .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  # Zależności Pythona (requirements_dev.txt + requirements_test.txt)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns:
          - "*"
