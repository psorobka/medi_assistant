name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -r requirements_dev.txt
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Pytest (loads into Home Assistant)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements_test.txt
      - run: pytest -q --cov --cov-report=term-missing --cov-fail-under=90
      - name: Coverage summary
        if: always()
        run: |
          {
            echo '## Coverage'
            coverage report --format=markdown
          } >> "$GITHUB_STEP_SUMMARY"

  hassfest:
    name: Hassfest (manifest validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          # The integration is not (yet) published in the home-assistant/brands
          # repo; skip that check so validation passes for a custom repository.
          ignore: brands
